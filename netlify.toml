[build]
  command = "cd frontend && npm run build"
  publish = "frontend/dist"

# SPA fallback — 모든 경로를 index.html로 리디렉트
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API 프록시 — 백엔드 서버로 전달
# 이 값을 실제 백엔드 URL로 변경하세요 (예: Render, Railway 등에 배포된 서버)
# 백엔드가 없으면 주석 처리하고, 로컬에서만 사용하세요
# [[redirects]]
#   from = "/api/*"
#   to = "https://your-backend-url.com/api/:splat"
#   status = 200

# 환경 변수 설정
[build.environment]
  NODE_VERSION = "18"
